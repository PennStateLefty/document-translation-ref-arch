name: Deploy — Infrastructure & Application

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'src/**'
      - 'azure.yaml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_RESOURCE_GROUP: rg-${{ vars.AZURE_ENV_NAME }}

jobs:
  infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    outputs:
      functionAppName: ${{ steps.deploy.outputs.functionAppName }}
      staticWebAppName: ${{ steps.deploy.outputs.staticWebAppName }}
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        id: bicep
        run: |
          DEPLOY_NAME="deploy-$(date +%Y%m%d%H%M%S)"
          echo "deployName=$DEPLOY_NAME" >> "$GITHUB_OUTPUT"

          az deployment sub create \
            --name "$DEPLOY_NAME" \
            --location "${{ env.AZURE_LOCATION }}" \
            --template-file infra/main.bicep \
            --parameters infra/main.parameters.json \
            --parameters environmentName="${{ env.AZURE_ENV_NAME }}" \
              location="${{ env.AZURE_LOCATION }}" \
              deployerPrincipalId="${{ secrets.DEPLOYER_PRINCIPAL_ID }}"

      - name: Get deployment outputs
        id: deploy
        if: always() && steps.bicep.outputs.deployName != ''
        run: |
          DEPLOY_NAME="${{ steps.bicep.outputs.deployName }}"

          FUNC_NAME=$(az deployment sub show \
            --name "$DEPLOY_NAME" \
            --query 'properties.outputs.functionAppName.value' \
            --output tsv 2>/dev/null || true)

          SWA_NAME=$(az deployment sub show \
            --name "$DEPLOY_NAME" \
            --query 'properties.outputs.staticWebAppName.value' \
            --output tsv 2>/dev/null || true)

          echo "Function App: $FUNC_NAME"
          echo "Static Web App: $SWA_NAME"
          echo "functionAppName=$FUNC_NAME" >> "$GITHUB_OUTPUT"
          echo "staticWebAppName=$SWA_NAME" >> "$GITHUB_OUTPUT"

          if [[ -z "$FUNC_NAME" || -z "$SWA_NAME" ]]; then
            echo "::error::Failed to retrieve deployment outputs. FUNC_NAME='$FUNC_NAME' SWA_NAME='$SWA_NAME'"
            exit 1
          fi

  deploy-api:
    name: Deploy Function App
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build
        shell: bash
        run: |
          pushd './src/api'
          dotnet build --configuration Release --output ./output
          popd

      - name: Deploy to Azure Functions (Flex Consumption)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ needs.infra.outputs.functionAppName }}
          package: './src/api/output'

  deploy-web:
    name: Deploy Static Web App
    runs-on: ubuntu-latest
    needs: infra
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/web/package-lock.json

      - name: Install & Build
        run: |
          export NODE_ENV=development
          npm ci
          npm run build

      - name: Deploy to Static Web App
        run: |
          npx @azure/static-web-apps-cli deploy ./dist \
            --subscription-id "${{ env.AZURE_SUBSCRIPTION_ID }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --app-name "${{ needs.infra.outputs.staticWebAppName }}" \
            --env production
